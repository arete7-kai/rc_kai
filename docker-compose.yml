# 起一个 Postgres 供本服务使用。目标：评审 `docker compose up` 一条命令即可复现。
# migrations/ 挂到 initdb.d，首次初始化（数据目录为空）时自动执行建表 SQL。
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    ports:
      - "5432:5432"
    volumes:
      # 只在首次初始化时执行；按文件名字典序运行，故命名带序号前缀。
      - ./migrations:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay -d relay"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
